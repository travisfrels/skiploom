<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skiploom Recipe Importer Options</title>
  <style>
    body {
      max-width: 400px;
      padding: 24px;
      font-family: system-ui, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 16px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <h1>Skiploom Recipe Importer Options</h1>
  <label for="skiploomUrl">Skiploom Base URL</label>
  <input type="text" id="skiploomUrl" placeholder="http://localhost:5173">
  <button id="save">Save</button>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
