<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px;
    }
    p {
      font-size: 13px;
      color: #555;
      margin: 0;
    }
    #recipe-info {
      display: none;
    }
    #recipe-title {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .stats {
      font-size: 12px;
      color: #555;
      margin: 0 0 12px;
    }
    #import-button {
      display: block;
      width: 100%;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background-color: #2563eb;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #import-button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <h1>Skiploom Recipe Importer</h1>
  <p id="status">Checking for recipe...</p>
  <div id="recipe-info">
    <p id="recipe-title"></p>
    <p class="stats">
      <span id="ingredient-count"></span> ingredients,
      <span id="step-count"></span> steps
    </p>
    <button id="import-button">Import to Skiploom</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
